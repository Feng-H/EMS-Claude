server:
  port: 8080
  mode: release

storage:
  mode: database # Docker部署使用数据库模式

database:
  host: postgres
  port: 5432
  user: ems
  password: ems123
  dbname: ems_db
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: your-secret-key-change-in-production
  expire_hours: 24
  issuer: ems-system

log:
  level: info
  filename: logs/ems.log
  max_size: 100
  max_backups: 3
  max_age: 28
  compress: true

upload:
  max_size: 10485760
  allowed_types: ["image/jpeg", "image/png", "image/jpg"]
  save_path: ./uploads

app:
  qr_code_base_url: "https://ems.example.com/equipment/"
  gps_validation_enabled: false
  gps_tolerance_meters: 100

llm:
  provider: openai
  base_url: ""
  api_key: ""
  model: ""
